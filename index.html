<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#14182B" />
    <title>PulseNote</title>
    <!--
      Este é o alvo do rewrite "catch-all" em vercel.json ("/(.*)" -> "/index.html").
      Qualquer caminho que não bata com nenhuma rota conhecida (/login, /app,
      /forgot-password, /privacy, arquivos estáticos) cai aqui. Como o PulseNote
      não é uma SPA de verdade (é HTML/JS puro por página, servido de src/),
      este arquivo só existe pra mandar a pessoa pro lugar certo — quem não
      estiver logado já é redirecionado pro /login de dentro do próprio
      onAuthStateChanged em src/app.js quando chega em /app.
    -->
    <meta http-equiv="refresh" content="0; url=/app" />
    <script>window.location.replace("/app");</script>
  </head>
  <body>
    <p>Redirecionando para o PulseNote… <a href="/app">clique aqui</a> se não acontecer automaticamente.</p>
  </body>
</html>
